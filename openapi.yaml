openapi: 3.0.3

info:
  title: Policy Overview Dashboard
  description: |
    Read-only API for retrieving insurance policies.
    Supports filtering by status and region with paginated results.
  version: 1.0.0
  contact:
    email: meet.ravig@gmail.com

servers:
  - url: http://localhost:8081
    description: Local development

tags:
  - name: Policies
    description: Insurance policy retrieval

paths:
  /api/policies:
    get:
      tags:
        - Policies
      summary: List insurance policies
      description: |
        Returns a paginated list of insurance policies.
        Both `status` and `region` filters are optional — omitting either returns all values.
        Results are sorted by `startDate` descending by default.
      operationId: getPolicies
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by policy status.
          schema:
            $ref: '#/components/schemas/PolicyStatus'
        - name: region
          in: query
          required: false
          description: Filter by region.
          schema:
            $ref: '#/components/schemas/Region'
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: Number of records per page.
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          required: false
          description: "Sort field and direction. Format: `field,direction`. Example: `endDate,asc`"
          schema:
            type: string
            default: startDate,desc
      responses:
        '200':
          description: Paginated list of policies returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyPage'
              examples:
                active_singapore:
                  summary: Active policies in Singapore
                  value:
                    content:
                      - id: 11
                        policyNumber: POL-APAC-001
                        holderName: John Smith
                        region: Singapore
                        status: Active
                        premium:
                          amount: 300.00
                          currency: SGD
                        startDate: "2024-01-01"
                        endDate: "2029-01-01"
                        isExpiringSoon: false
                      - id: 16
                        policyNumber: POL-EXPIRING-001
                        holderName: John Smith
                        region: Singapore
                        status: Active
                        premium:
                          amount: 100.00
                          currency: SGD
                        startDate: "2024-01-01"
                        endDate: "2026-06-20"
                        isExpiringSoon: true
                    totalElements: 2
                    totalPages: 1
                    size: 10
                    number: 0
                    first: true
                    last: true
                empty_result:
                  summary: No policies match the filters
                  value:
                    content: []
                    totalElements: 0
                    totalPages: 0
                    size: 10
                    number: 0
                    first: true
                    last: true
        '503':
          description: Database or downstream service is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2026-06-07T10:30:00"
                status: 503
                message: Policy service is temporarily unavailable. Please try again later.

components:
  schemas:

    PolicyStatus:
      type: string
      description: Lifecycle status of the policy.
      enum:
        - ACTIVE
        - INACTIVE
        - EXPIRED
        - PENDING
        - LAPSED

    Region:
      type: string
      description: APAC region the policy belongs to.
      enum:
        - SINGAPORE
        - HONG_KONG
        - AUSTRALIA
        - INDIA
        - JAPAN

    PremiumDto:
      type: object
      description: Premium amount with its currency.
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          format: decimal
          example: 300.00
          description: Monthly premium amount.
        currency:
          type: string
          example: SGD
          description: ISO 4217 currency code.

    PolicySummaryResponse:
      type: object
      description: Summary view of a single policy returned in the list.
      required:
        - id
        - policyNumber
        - status
        - premium
        - startDate
        - endDate
        - isExpiringSoon
      properties:
        id:
          type: integer
          format: int64
          example: 11
          description: Internal policy identifier.
        policyNumber:
          type: string
          example: POL-APAC-001
          description: Business policy number.
        holderName:
          type: string
          nullable: true
          example: John Smith
          description: Full name of the policy holder (firstName + lastName).
        region:
          type: string
          nullable: true
          example: Singapore
          description: Human-readable region name. Never the raw enum value.
        status:
          type: string
          example: Active
          description: Title-cased policy status. Never the raw enum value (e.g. "Active" not "ACTIVE").
        premium:
          $ref: '#/components/schemas/PremiumDto'
        startDate:
          type: string
          format: date
          example: "2024-01-01"
          description: Policy start date in ISO-8601 format (yyyy-MM-dd).
        endDate:
          type: string
          format: date
          example: "2029-01-01"
          description: Policy end date in ISO-8601 format (yyyy-MM-dd).
        isExpiringSoon:
          type: boolean
          example: false
          description: |
            True when endDate is on or after today and within the configured
            warning window (default 30 days). Configurable via POLICY_EXPIRY_WARNING_DAYS.

    PolicyPage:
      type: object
      description: Paginated wrapper around a list of PolicySummaryResponse items.
      required:
        - content
        - totalElements
        - totalPages
        - size
        - number
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PolicySummaryResponse'
        totalElements:
          type: integer
          format: int64
          example: 6
          description: Total number of policies matching the applied filters.
        totalPages:
          type: integer
          example: 1
          description: Total number of pages available at the current page size.
        size:
          type: integer
          example: 10
          description: Number of records per page as requested.
        number:
          type: integer
          example: 0
          description: Current page index (zero-based).
        first:
          type: boolean
          example: true
          description: True if this is the first page.
        last:
          type: boolean
          example: true
          description: True if this is the last page.

    ErrorResponse:
      type: object
      description: Structured error returned for all non-2xx responses.
      required:
        - timestamp
        - status
        - message
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-06-07T10:30:00"
          description: UTC timestamp when the error occurred.
        status:
          type: integer
          example: 503
          description: HTTP status code.
        message:
          type: string
          example: Policy service is temporarily unavailable. Please try again later.
          description: Human-readable error message. Never contains stack traces or internal class names.
