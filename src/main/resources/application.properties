spring.application.name=PolicyOverviewDashboard

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/insuranceDB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Flyway owns the schema (db/migration/V*.sql); Hibernate only validates against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8081}

policy.expiry.warning-days=${POLICY_EXPIRY_WARNING_DAYS:30}

# Caching (Caffeine) — frequently accessed reads: summary, listings, detail
cache.ttl-seconds=${CACHE_TTL_SECONDS:60}
cache.max-size=${CACHE_MAX_SIZE:1000}

# Swagger UI serves the committed contract (src/main/resources/static/openapi.yaml -> /openapi.yaml)
springdoc.swagger-ui.url=/openapi.yaml

# Health checks (Spring Boot Actuator): /actuator/health + liveness/readiness probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
